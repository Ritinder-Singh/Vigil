services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    env_file:
      - .env
    restart: unless-stopped

  frontend-build:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    volumes:
      - frontend_dist:/output

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped

volumes:
  frontend_dist: